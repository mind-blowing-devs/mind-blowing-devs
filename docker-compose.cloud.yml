version: '3.9'

services:
  client:
    container_name: prakticum-client
    image: ghcr.io/mind-blowing-devs/mind-blowing-devs/client:01d9bb3973319926659738f6c60d6387acd6a009
    restart: always
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - CLIENT_PORT=5000
      - SERVER_PORT=5001
      - EXTERNAL_SERVER_URL=http://VM_IP:5001
      - INTERNAL_SERVER_URL=http://server:5001
      - ORIGIN_DEV_URL=http://localhost:5000
      - ORIGIN_PROD_URL=http://VM_IP:5000
    networks:
      - practicum-network
  server:
    container_name: prakticum-server
    image: ghcr.io/mind-blowing-devs/mind-blowing-devs/server:01d9bb3973319926659738f6c60d6387acd6a009
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - '5001:5001'
    environment:
      SERVER_PORT: 5001
      REDIS_PORT: 6379
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      POSTGRES_PORT: 5432
      EXTERNAL_SERVER_URL: http://VM_IP:5001
      INTERNAL_SERVER_URL: http://server:5001
      ORIGIN_DEV_URL: http://localhost:5000
      ORIGIN_PROD_URL: http://VM_IP:5000
    networks:
      - postgres-network
      - practicum-network

    command: sh -c "./wait-for.sh postgres:5432 --
      ./wait-for.sh redis:6379 --
      node /app/src/index.js"

  postgres:
    image: postgres:14
    ports:
      - '5432:5432'
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./tmp/pgdata:/var/lib/postgresql/data
    networks:
      - postgres-network
  pgadmin:
    container_name: pgadmin
    image: dpage/pgadmin4:4.18
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: secret
      PGADMIN_LISTEN_PORT: 5466
    ports:
      - '5466:5466'
    volumes:
      - ./tmp/pgadmin-data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - postgres-network

  redis:
    container_name: redis
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - ./tmp/redis-data:/var/lib/redis
    networks:
      - practicum-network

networks:
  practicum-network:
    driver: bridge
  postgres-network:
    driver: bridge
