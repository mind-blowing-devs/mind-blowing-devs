worker_processes auto;

events {
    worker_connections 1024;
}

http {
    server_tokens off;

    server {
        listen 80;
        listen [::]:80;

        server_name minesweeper.ya-praktikum.tech;

        # redirects all non-SSL traffic to HTTPS
        return 301 https://$host$request_uri;

        # only for debug, in production insecure requests should be redirected
        #include /etc/nginx/routes.conf;
    }

    # SSL server block
    # make sure certificates exist
    server {
        set $host_name minesweeper.ya-praktikum.tech;

        listen 443 ssl;
        listen 443 quic reuseport;
        listen [::]:443 ssl;
        listen [::]:443 quic reuseport;

        http2 on;
        http3 on;
        ssl_early_data on;
        quic_retry on;
        add_header Alt-Svc 'h3=":443"; ma=86400';

        # CSP headers
        include /etc/nginx/csp.conf;

        server_name $host_name;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_certificate /etc/letsencrypt/live/$host_name/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/$host_name/privkey.pem;

        include /etc/nginx/routes.conf;
    }
}
