name: CI Checks

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      # Базовая настройка Node.js и кэширование зависимостей
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 16
          cache: 'yarn'

      - name: Install dependencies
        run: yarn

      - name: Initialize project
        run: yarn bootstrap

      - name: Run linting
        run: yarn lint

      # Проверка типов TypeScript
      # На начальном этапе можно закомментировать, если проверка мешает разработке
      - name: Run type checking
        run: yarn workspace client tsc --noEmit

      - name: Run tests
        run: yarn test

      # Проверка успешности сборки проекта
      # На начальном этапе можно закомментировать, если проверка мешает разработке
      - name: Build check
        run: yarn build
